<!DOCTYPE html>
<html>
<head>
  <title>Quick Edge Function Test</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    #output { background: #f5f5f5; padding: 15px; border-radius: 5px; white-space: pre-wrap; }
    button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🔬 Quick Edge Function Reachability Test</h1>
  <button onclick="testReachability()">Test 1: Is edge function URL reachable?</button>
  <button onclick="testWithAnonKey()">Test 2: Test with anon key only</button>
  <div id="output">Click a button to test...</div>

  <script>
    const EDGE_URL = 'https://naesxujdffcmatntrlfr.supabase.co/functions/v1/create-admin';
    const output = document.getElementById('output');

    async function testReachability() {
      output.textContent = '⏳ Testing if URL is reachable...\n\n';
      
      try {
        // Simple OPTIONS request to check CORS
        const response = await fetch(EDGE_URL, { method: 'OPTIONS' });
        output.textContent += `✅ URL is reachable!\n`;
        output.textContent += `Status: ${response.status}\n`;
        output.textContent += `Headers:\n`;
        response.headers.forEach((value, key) => {
          output.textContent += `  ${key}: ${value}\n`;
        });
      } catch (error) {
        output.textContent += `❌ URL not reachable!\n`;
        output.textContent += `Error: ${error.message}\n\n`;
        output.textContent += `This means:\n`;
        output.textContent += `1. Edge function is NOT deployed, OR\n`;
        output.textContent += `2. URL is incorrect, OR\n`;
        output.textContent += `3. Network/CORS issue\n\n`;
        output.textContent += `FIX: Deploy the edge function:\n`;
        output.textContent += `  cd dashboard\n`;
        output.textContent += `  supabase functions deploy create-admin\n`;
      }
    }

    async function testWithAnonKey() {
      const ANON_KEY = prompt('Enter your Supabase anon key:', '');
      if (!ANON_KEY) return;

      output.textContent = '⏳ Testing with anon key...\n\n';
      
      try {
        const response = await fetch(EDGE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${ANON_KEY}`,
          },
          body: JSON.stringify({
            email: 'test@example.com',
            password: 'test123',
            roleName: 'admin',
            permissions: {}
          })
        });

        const text = await response.text();
        output.textContent += `Status: ${response.status} ${response.statusText}\n`;
        output.textContent += `Response: ${text}\n\n`;

        if (response.status === 401) {
          output.textContent += `❌ 401 Unauthorized\n`;
          output.textContent += `This means the function IS deployed but:\n`;
          output.textContent += `  - Your token is invalid, OR\n`;
          output.textContent += `  - You're not a super admin, OR\n`;
          output.textContent += `  - The function can't validate your token\n\n`;
          output.textContent += `Next: Check your session in the actual app console\n`;
        } else if (response.status === 400) {
          output.textContent += `✅ Function is working! Got validation error (expected)\n`;
        } else if (response.ok) {
          output.textContent += `✅ Success! Function is working!\n`;
        }
      } catch (error) {
        output.textContent += `❌ Error: ${error.message}\n`;
      }
    }
  </script>
</body>
</html>
