<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Admin Edge Function Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    h2 { margin-top: 0; }
    button { padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #059669; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; font-family: monospace; }
    textarea { min-height: 100px; }
    .log { background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .success { color: #10b981; font-weight: bold; }
    .error { color: #ef4444; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🔍 Create Admin Edge Function Diagnostic Tool</h1>
  
  <div class="section">
    <h2>Step 1: Enter Your Auth Token</h2>
    <p>Get this from browser console on your admin dashboard: <code>supabase.auth.getSession().then(s => console.log(s.data.session.access_token))</code></p>
    <input type="text" id="authToken" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
    <button onclick="decodeToken()">Decode Token</button>
    <div id="tokenInfo" class="log" style="margin-top: 10px;"></div>
  </div>

  <div class="section">
    <h2>Step 2: Test Edge Function</h2>
    <button onclick="testEdgeFunction()" id="testBtn">Test Edge Function</button>
    <div id="result" class="log" style="margin-top: 10px;"></div>
  </div>

  <script>
    const EDGE_FUNCTION_URL = 'https://naesxujdffcmatntrlfr.supabase.co/functions/v1/create-admin';

    function decodeToken() {
      const token = document.getElementById('authToken').value.trim();
      const output = document.getElementById('tokenInfo');
      
      if (!token) {
        output.innerHTML = '<span class="error">❌ Please enter a token</span>';
        return;
      }

      try {
        const parts = token.split('.');
        if (parts.length !== 3) {
          output.innerHTML = '<span class="error">❌ Invalid JWT format (should have 3 parts)</span>';
          return;
        }

        const payload = JSON.parse(atob(parts[1]));
        const issuedAt = new Date(payload.iat * 1000).toLocaleString();
        const expiresAt = new Date(payload.exp * 1000).toLocaleString();
        const isExpired = Date.now() / 1000 > payload.exp;

        output.innerHTML = `
<strong>Token Details:</strong>
User ID: ${payload.sub}
Email: ${payload.email || 'N/A'}
Issued At: ${issuedAt}
Expires At: ${expiresAt}
<span class="${isExpired ? 'error' : 'success'}">Status: ${isExpired ? '❌ EXPIRED' : '✅ VALID'}</span>
        `;
      } catch (error) {
        output.innerHTML = `<span class="error">❌ Failed to decode: ${error.message}</span>`;
      }
    }

    async function testEdgeFunction() {
      const token = document.getElementById('authToken').value.trim();
      const resultDiv = document.getElementById('result');
      const testBtn = document.getElementById('testBtn');
      
      if (!token) {
        resultDiv.innerHTML = '<span class="error">❌ Please enter your auth token first</span>';
        return;
      }

      testBtn.disabled = true;
      resultDiv.innerHTML = '⏳ Testing edge function...\n\n';

      try {
        const testData = {
          email: 'test-diagnostic@example.com',
          password: 'testpass123456',
          roleName: 'admin',
          permissions: {
            vendor_management: false,
            order_management: false,
            product_management: false,
            finance_management: false,
            analytics_monitoring: false,
          }
        };

        resultDiv.innerHTML += `📤 Sending request to:\n${EDGE_FUNCTION_URL}\n\n`;
        resultDiv.innerHTML += `📦 Payload:\n${JSON.stringify(testData, null, 2)}\n\n`;

        const response = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify(testData),
        });

        resultDiv.innerHTML += `📥 Response Status: ${response.status} ${response.statusText}\n\n`;

        const responseData = await response.json();
        resultDiv.innerHTML += `📥 Response Body:\n${JSON.stringify(responseData, null, 2)}\n\n`;

        if (response.ok) {
          resultDiv.innerHTML += '<span class="success">✅ SUCCESS! Edge function is working correctly.</span>\n';
        } else {
          resultDiv.innerHTML += `<span class="error">❌ FAILED with status ${response.status}</span>\n\n`;
          
          if (response.status === 401) {
            resultDiv.innerHTML += `<strong>Diagnosis:</strong>
${responseData.error?.includes('Missing authorization') 
  ? 'The Authorization header is not being sent. This is unexpected.' 
  : responseData.error?.includes('invalid token')
  ? 'Your token is invalid or expired. Get a fresh token by signing out and signing back in.'
  : 'Authentication failed. Check that your token is valid.'}

<strong>Next Steps:</strong>
1. Verify your token is not expired (use the Decode Token button above)
2. If token is valid, the edge function may not be deployed
3. Deploy it: supabase functions deploy create-admin`;
          } else if (response.status === 403) {
            resultDiv.innerHTML += `<strong>Diagnosis:</strong> You are not a Super Admin.

<strong>Fix:</strong> Run this SQL in Supabase SQL Editor:
UPDATE admin_users 
SET is_super_admin = true, role = 'super_admin'
WHERE user_id = '${JSON.parse(atob(token.split('.')[1])).sub}';`;
          } else if (response.status === 500) {
            resultDiv.innerHTML += `<strong>Diagnosis:</strong> Edge function internal error.

<strong>Next Steps:</strong>
1. Check edge function logs in Supabase Dashboard
2. Verify secrets are set: SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY
3. Check that admin_users table exists`;
          }
        }
      } catch (error) {
        resultDiv.innerHTML += `<span class="error">❌ Network Error: ${error.message}</span>\n\n`;
        resultDiv.innerHTML += `This could mean:
- CORS is blocking the request
- The edge function URL is incorrect
- The edge function is not deployed`;
      } finally {
        testBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
