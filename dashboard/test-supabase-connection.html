<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Connection Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
    .success { background: #d4edda; border-color: #c3e6cb; }
    .error { background: #f8d7da; border-color: #f5c6cb; }
    .loading { background: #fff3cd; border-color: #ffeaa7; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Supabase Connection Test</h1>
  
  <div class="section">
    <h2>1. Check Environment Variables</h2>
    <div id="env-check"></div>
  </div>

  <div class="section">
    <h2>2. Test Supabase Connection</h2>
    <button onclick="testConnection()">Test Connection</button>
    <div id="connection-result"></div>
  </div>

  <div class="section">
    <h2>3. Test Auth (Sign Up)</h2>
    <input type="email" id="test-email" placeholder="Test email" style="padding: 8px; margin: 5px;">
    <input type="password" id="test-password" placeholder="Password (min 6 chars)" style="padding: 8px; margin: 5px;">
    <button onclick="testSignUp()">Test Sign Up</button>
    <div id="signup-result"></div>
  </div>

  <div class="section">
    <h2>4. Test Auth (Sign In)</h2>
    <input type="email" id="signin-email" placeholder="Email" style="padding: 8px; margin: 5px;">
    <input type="password" id="signin-password" placeholder="Password" style="padding: 8px; margin: 5px;">
    <button onclick="testSignIn()">Test Sign In</button>
    <div id="signin-result"></div>
  </div>

  <div class="section">
    <h2>5. Test Vendor Query</h2>
    <button onclick="testVendorQuery()" id="vendor-btn" disabled>Test Vendor Query</button>
    <div id="vendor-result"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Initialize Supabase client
    const supabaseUrl = 'https://naesxujdffcmatntrlfr.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hZXN4dWpkZmZjbWF0bnRybGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzIwODIsImV4cCI6MjA5MTI0ODA4Mn0.oBJ2MkX-2BwmI5G6ho1Vcg5gj5XBRVgrb-0llRbKGGg';
    
    const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
    let currentUserId = null;

    // Check env vars
    document.getElementById('env-check').innerHTML = `
      <div class="success">
        <p><strong>Supabase URL:</strong> ${supabaseUrl}</p>
        <p><strong>Supabase Anon Key:</strong> ${supabaseAnonKey.substring(0, 20)}...</p>
      </div>
    `;

    async function testConnection() {
      const resultDiv = document.getElementById('connection-result');
      resultDiv.className = 'loading';
      resultDiv.innerHTML = '<p>Testing connection...</p>';

      try {
        const { data, error } = await supabase.from('vendors').select('count').limit(1);
        
        if (error) {
          resultDiv.className = 'error';
          resultDiv.innerHTML = `<p><strong>Error:</strong> ${error.message}</p><pre>${JSON.stringify(error, null, 2)}</pre>`;
        } else {
          resultDiv.className = 'success';
          resultDiv.innerHTML = `<p><strong>✓ Connection successful!</strong></p><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch (err) {
        resultDiv.className = 'error';
        resultDiv.innerHTML = `<p><strong>Error:</strong> ${err.message}</p>`;
      }
    }

    async function testSignUp() {
      const email = document.getElementById('test-email').value;
      const password = document.getElementById('test-password').value;
      const resultDiv = document.getElementById('signup-result');

      if (!email || !password) {
        resultDiv.className = 'error';
        resultDiv.innerHTML = '<p>Please provide email and password</p>';
        return;
      }

      resultDiv.className = 'loading';
      resultDiv.innerHTML = '<p>Signing up...</p>';

      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: window.location.origin
          }
        });

        if (error) {
          resultDiv.className = 'error';
          resultDiv.innerHTML = `<p><strong>Error:</strong> ${error.message}</p>`;
        } else {
          resultDiv.className = 'success';
          resultDiv.innerHTML = `
            <p><strong>✓ Sign up successful!</strong></p>
            <p>User ID: ${data.user?.id}</p>
            <p>Email: ${data.user?.email}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
          currentUserId = data.user?.id;
          document.getElementById('vendor-btn').disabled = false;
        }
      } catch (err) {
        resultDiv.className = 'error';
        resultDiv.innerHTML = `<p><strong>Error:</strong> ${err.message}</p>`;
      }
    }

    async function testSignIn() {
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const resultDiv = document.getElementById('signin-result');

      if (!email || !password) {
        resultDiv.className = 'error';
        resultDiv.innerHTML = '<p>Please provide email and password</p>';
        return;
      }

      resultDiv.className = 'loading';
      resultDiv.innerHTML = '<p>Signing in...</p>';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          resultDiv.className = 'error';
          resultDiv.innerHTML = `<p><strong>Error:</strong> ${error.message}</p>`;
        } else {
          resultDiv.className = 'success';
          resultDiv.innerHTML = `
            <p><strong>✓ Sign in successful!</strong></p>
            <p>User ID: ${data.user?.id}</p>
            <p>Email: ${data.user?.email}</p>
          `;
          currentUserId = data.user?.id;
          document.getElementById('vendor-btn').disabled = false;
        }
      } catch (err) {
        resultDiv.className = 'error';
        resultDiv.innerHTML = `<p><strong>Error:</strong> ${err.message}</p>`;
      }
    }

    async function testVendorQuery() {
      if (!currentUserId) {
        alert('Please sign up or sign in first');
        return;
      }

      const resultDiv = document.getElementById('vendor-result');
      resultDiv.className = 'loading';
      resultDiv.innerHTML = '<p>Querying vendor data...</p>';

      try {
        // Try to fetch vendor
        const { data, error } = await supabase
          .from('vendors')
          .select('*')
          .eq('user_id', currentUserId)
          .maybeSingle();

        if (error) {
          resultDiv.className = 'error';
          resultDiv.innerHTML = `<p><strong>Error:</strong> ${error.message}</p><pre>${JSON.stringify(error, null, 2)}</pre>`;
        } else if (!data) {
          resultDiv.className = 'loading';
          resultDiv.innerHTML = `
            <p><strong>No vendor found.</strong> Creating new vendor...</p>
          `;

          // Create new vendor
          const newVendor = {
            user_id: currentUserId,
            business_name: 'Test Vendor',
            contact_email: 'test@example.com',
            status: 'pending',
            is_approved: false
          };

          const { data: created, error: createError } = await supabase
            .from('vendors')
            .insert(newVendor)
            .select()
            .single();

          if (createError) {
            resultDiv.className = 'error';
            resultDiv.innerHTML = `<p><strong>Error creating vendor:</strong> ${createError.message}</p><pre>${JSON.stringify(createError, null, 2)}</pre>`;
          } else {
            resultDiv.className = 'success';
            resultDiv.innerHTML = `
              <p><strong>✓ Vendor created!</strong></p>
              <pre>${JSON.stringify(created, null, 2)}</pre>
            `;
          }
        } else {
          resultDiv.className = 'success';
          resultDiv.innerHTML = `
            <p><strong>✓ Vendor found!</strong></p>
            <p>Is Approved: ${data.is_approved}</p>
            <p>Status: ${data.status}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        }
      } catch (err) {
        resultDiv.className = 'error';
        resultDiv.innerHTML = `<p><strong>Error:</strong> ${err.message}</p>`;
      }
    }
  </script>
</body>
</html>
