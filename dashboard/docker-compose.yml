# Production-style run: Next.js only. Set DATABASE_URL, AUTH_SECRET, NEXTAUTH_URL in `.env` (see `.env.example`).
version: '3.8'

services:
  vendor-dashboard:
    build: .
    container_name: vendor-dashboard
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => { process.exit(1); });",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - vendor-network

networks:
  vendor-network:
    driver: bridge
